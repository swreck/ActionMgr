[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate && npx tsc && cd ../frontend && npm install && npm run build && cp -r dist ../backend/public"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
